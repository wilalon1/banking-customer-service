spring:

  application:

    name: customer-service


  config:

    import: configserver:http://localhost:8888



server:

  port: 8081



eureka:

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true



management:

  endpoints:

    web:

      exposure:

        include: health,info
